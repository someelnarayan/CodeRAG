services:
  - type: web
    name: code-ragg-web
    env: docker
    plan: starter
    repo:
      type: git
      branch: main
    buildCommand: docker build -t code-ragg:latest .
    envVars:
      - key: DATABASE_URL
        fromDatabase: DATABASE_URL
      - key: REDIS_URL
        fromDatabase: REDIS_URL
      - key: SECRET_KEY
        fromDatabase: SECRET_KEY
    dockerfilePath: Dockerfile
    autoDeploy: true
    healthCheckPath: /health
    instanceType: starter
